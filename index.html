<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEO Cyber Console Edition</title>
    <style>
        :root {
            --bg-color: #06060e;
            --panel-bg: #0b0b16;
            --neon-cyan: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff0055;
            --text-color: #e0e0ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            background: var(--panel-bg);
            border: 1px solid #1a1a3a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.05);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .logo-badge {
            background: linear-gradient(135deg, #7928ca, #ff0080);
            color: white;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.3);
        }

        h1 {
            color: var(--text-color);
            font-size: 1.3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .author {
            font-size: 0.75rem;
            color: #8a8aaf;
            margin-top: 4px;
        }

        .status-box {
            border: 1px solid #1f2937;
            background: #090911;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.8rem;
        }

        .status-green {
            color: var(--neon-green);
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(90deg, #00f3ff, #0077ff);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
            transform: translateY(-1px);
        }

        .btn-alt {
            background: linear-gradient(90deg, #39ff14, #00aa50);
        }

        .btn-alt:hover {
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
        }

        .btn-clear {
            background: #222;
            color: #aaa;
        }

        .console {
            background-color: #030307;
            border: 1px solid #151525;
            border-radius: 8px;
            padding: 15px;
            height: 220px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
        }

        .log { margin-bottom: 8px; font-size: 0.8rem; line-height: 1.4; }
        .info { color: #ffe600; }
        .success { color: var(--neon-green); }
        .error { color: var(--neon-red); }
        .json { color: var(--neon-cyan); font-size: 0.75rem; padding-left: 5px; }
        
        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #444466;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <div class="logo-badge">LEO</div>
            <h1>LEO EMPOWERED OFFICE</h1>
            <div class="author">AUTHOR: S.LALITH</div>
        </header>

        <div class="status-box">
            <span class="status-green">● ZERO-TRUST ARCHITECTURE : ENGAGED</span>
        </div>

        <div class="btn-grid">
            <button class="btn" onclick="runOperation('inject')">Inject Core Payload</button>
            <button class="btn" onclick="runOperation('audit')">Audit Perimeter Firewall</button>
            <button class="btn btn-alt" onclick="runOperation('metrics')">Run S3 Cost Optimizer</button>
            <button class="btn btn-clear" onclick="clearConsole()">Clear Logs</button>
        </div>

        <div class="console">
            <pre id="console-body"><div class="log success">[SYSTEM] LEO Cloud Core Infrastructure Loaded.</div><div class="log info">[READY] Awaiting user handshake execution telemetry...</div></pre>
        </div>
    </div>

    <footer>
        © 2026 LEO (LALITH EMPOWERED OFFICE). ALL RIGHTS RESERVED.
    </footer>

    <script>
        // FIXED EXPLICIT URL TO MATCH YOUR ACTIVE RENDER NODE
        const API_BASE = "https://lalith-empowred-office.onrender.com/api/v1";

        function clearConsole() {
            document.getElementById('console-body').innerHTML = `<div class="log info">[SYSTEM] Console data matrix pipe flushed clear.</div>`;
        }

        function getTime() {
            const now = new Date();
            return `[${now.toTimeString().split(' ')[0]}]`;
        }

        async function runOperation(endpoint) {
            const consoleBody = document.getElementById('console-body');
            let url = `${API_BASE}/cloud/metrics`;
            let options = { method: 'GET' };

            if (endpoint === 'inject') {
                url = `${API_BASE}/inject`;
                options = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
                consoleBody.innerHTML = `<div class="log info">${getTime()} [INFO] Initializing handshake request to cloud gateway...</div>`;
            } else if (endpoint === 'audit') {
                url = `${API_BASE}/audit`;
                consoleBody.innerHTML = `<div class="log info">${getTime()} [INFO] Requesting active network socket scan maps...</div>`;
            } else {
                consoleBody.innerHTML = `<div class="log info">${getTime()} [INFO] Triggering storage matrix analysis sequence...</div>`;
            }

            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error("Server response error");
                const data = await response.json();
                
                consoleBody.innerHTML += `<div class="log success">${getTime()} [SUCCESS] RAW Cloud JSON Data Received:</div>`;
                consoleBody.innerHTML += `<div class="json">${JSON.stringify(data, null, 4)}</div>`;
            } catch (error) {
                consoleBody.innerHTML += `<div class="log error">${getTime()} [CRITICAL] Connection failure.</div>`;
                consoleBody.innerHTML += `<div class="log error">-> Render API is sleeping or URL spelling mismatch. Try clicking again in 30 seconds.</div>`;
            }
        }
    </script>
</body>
</html>
